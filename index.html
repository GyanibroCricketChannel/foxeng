  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      /********** Chrome check **********/
      const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
      if (!isChrome) {
        const chromeModal = document.getElementById('chromeModal');
        chromeModal.classList.remove('hidden');
        chromeModal.setAttribute('aria-hidden', 'false');
        return; // block video setup in non-Chrome
      }

      /********** Shaka player setup **********/
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
      } else {
        const video = document.querySelector('video');
        const player = new shaka.Player();
        await player.attach(video);

        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        ui.configure({
          controlPanelElements: [
            'play_pause', 'time_and_duration', 'mute', 'volume',
            'spacer', 'language', 'captions', 'picture_in_picture',
            'quality', 'fullscreen'
          ],
          volumeBarColors: {
            base: 'rgba(63, 187, 1, 1)',
            level: 'rgb(255, 69, 0)'
          },
          seekBarColors: {
            base: 'rgb(41, 41, 163)',
            buffered: 'rgb(35, 99, 3)',
            played: 'rgba(63, 187, 1, 1)'
          }
        });

        let drmConfig = {
          clearKeys: {
            "f6564ec2aee819046328a0e153be574d": "ff46a8a1031eb27ef22576a077c98ab7"
          }
        };
        let cookieHeader = "";
        let streamUrl = "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/enc/emxr7ezsoi/out/v1/9e895e2c1c894a75ac6d21a4deddd5d3/cenc.mpd";

        try {
          const response = await fetch('');
          const m3uText = await response.text();
          const lines = m3uText.split('\n');

          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('Star_Sports_HD1')) {
              for (let j = i - 1; j >= 0; j--) {
                if (lines[j].startsWith('#EXTHTTP:')) {
                  const cookieMatch = lines[j].match(/"cookie":"([^"]+)"/);
                  if (cookieMatch) {
                    cookieHeader = cookieMatch[1];
                  }
                  break;
                }
              }
              break;
            }
          }
        } catch (error) {
          console.error('Failed to fetch M3U:', error);
        }

        // FIXED: Enhanced prebuffer configuration for non-stop streaming
        player.configure({
          drm: drmConfig,
          streaming: {
            lowLatencyMode: true,
            bufferingGoal: 60,           // Increased from 15 to 60 seconds
            rebufferingGoal: 20,          // Increased from 2 to 20 seconds
            bufferBehind: 30,              // Increased from 15 to 30 seconds
            alwaysStreaming: true,         // Enable always streaming mode
            retryParameters: { 
              timeout: 15000,               // Increased from 10000 to 15000
              maxAttempts: 10,               // Increased from 5 to 10
              baseDelay: 500,                 // Increased from 300 to 500
              backoffFactor: 1.5              // Increased from 1.2 to 1.5
            },
            segmentRequestTimeout: 15000,    // Increased from 8000 to 15000
            segmentPrefetchLimit: 10,         // Increased from 2 to 10
            useNativeHlsOnSafari: true,
            smallGapLimit: 0.5,               // Add small gap handling
            jumpLargeGaps: true,               // Jump large gaps instead of stalling
            stallEnabled: true,                 // Enable stall detection
            stallThreshold: 2,                   // Stall threshold in seconds
            rebufferingEnabled: true,             // Enable rebuffering
            durationBackoff: 1,                    // Duration backoff
            ignoreTextStreamFailures: true,         // Ignore text stream failures
            ignoreManifestUpdateFailures: true,      // Ignore manifest update failures
            manifestUpdateRetryParameters: {
              timeout: 10000,
              maxAttempts: 5
            }
          },
          manifest: { 
            retryParameters: { 
              timeout: 15000,               // Increased from 8000 to 15000
              maxAttempts: 10,                // Increased from 3 to 10
              backoffFactor: 1.5
            },
            dash: {
              ignoreMinBufferTime: true,      // Ignore min buffer time from manifest
              autoCorrectDrift: true,          // Auto correct drift
              initialSegmentLimit: 2000         // Increased segment limit
            }
          },
          offline: {
            usePersistentLicense: false
          },
          abr: {
            enabled: true,
            defaultBandwidthEstimate: 8000000,  // 8 Mbps default bandwidth
            switchInterval: 2,                     // Check ABR every 2 seconds
            bandwidthUpgradeTarget: 0.7,            // Upgrade at 70% usage
            bandwidthDowngradeTarget: 0.5,           // Downgrade at 50% usage
            restrictions: {
              minWidth: 320,
              maxWidth: 1920,
              minHeight: 240,
              maxHeight: 1080,
              minPixels: 76800,
              maxPixels: 2073600
            }
          }
        });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
          request.headers['Referer'] = 'https://live-pv-ta.amazon.fastly-edge.com/';
          request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
          request.headers['Cookie'] = cookieHeader;
          request.headers['Connection'] = 'keep-alive';  // Add keep-alive header
          request.headers['Keep-Alive'] = 'timeout=60';   // Keep connection alive

          if (
            (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
             type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
            request.uris[0] && !request.uris[0].includes('__hdnea__=')
          ) {
            const separator = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += separator + cookieHeader;
          }
        });

        // FIXED: Add error handling and auto-recovery
        player.addEventListener('error', (event) => {
          console.error('Player error:', event.detail);
          
          // Attempt to recover from error
          if (event.detail && event.detail.type === shaka.util.Error.Severity.RECOVERABLE) {
            console.log('Attempting to recover from error...');
            player.load(streamUrl).catch(e => {
              console.error('Recovery failed:', e);
              // Retry after 3 seconds
              setTimeout(() => {
                player.load(streamUrl).catch(console.error);
              }, 3000);
            });
          }
        });

        // FIXED: Add buffering event handling
        video.addEventListener('waiting', () => {
          console.log('Buffering...');
          // Force rebuffer if stuck
          if (player) {
            player.getConfiguration().streaming.rebufferingGoal = 30;
          }
        });

        video.addEventListener('playing', () => {
          console.log('Playing smoothly');
        });

        // FIXED: Add stall detection and recovery
        let stallTimeout;
        video.addEventListener('stalled', () => {
          console.log('Stream stalled, attempting recovery...');
          if (stallTimeout) clearTimeout(stallTimeout);
          stallTimeout = setTimeout(() => {
            if (video.readyState < 3) { // HAVE_FUTURE_DATA
              video.load(); // Reload video element
              player.load(streamUrl).catch(console.error);
            }
          }, 5000);
        });

        try {
          await player.load(streamUrl);
          console.log('Stream loaded successfully');
          
          // FIXED: Periodic buffer check
          setInterval(() => {
            if (video && player) {
              const buffered = video.buffered;
              if (buffered.length > 0) {
                const currentTime = video.currentTime;
                const bufferedEnd = buffered.end(buffered.length - 1);
                const bufferAhead = bufferedEnd - currentTime;
                
                // If buffer is low, force more buffering
                if (bufferAhead < 10) {
                  console.log('Low buffer detected:', bufferAhead.toFixed(2), 'seconds');
                  player.configure({ streaming: { bufferingGoal: 60 } });
                }
              }
            }
          }, 10000); // Check every 10 seconds
          
        } catch (error) {
          console.error('Load error:', error);
          // Retry loading after 5 seconds
          setTimeout(() => {
            player.load(streamUrl).catch(console.error);
          }, 5000);
        }
      }
    });
  </script>
